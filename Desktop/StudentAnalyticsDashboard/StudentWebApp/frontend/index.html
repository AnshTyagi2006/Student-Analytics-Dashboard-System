<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Analytics Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body data-theme="light">
    <div class="container">
        <header>
            <div class="header-content">
                <h1>🎓 Student Analytics Dashboard</h1>
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">🌙</button>
            </div>
            <nav>
                <button onclick="showSection('home')">🏠 Home</button>
                <button onclick="showSection('add')">➕ Add Student</button>
                <button onclick="showSection('view')">👥 View Students</button>
                <button onclick="showSection('search')">🔍 Search</button>
                <button onclick="showSection('dashboard')">📊 Dashboard</button>
            </nav>
        </header>

        <main>
            <!-- Home -->
            <section id="home" class="section active">
                <div class="hero">
                    <h2>Advanced Student Management & Analytics</h2>
                    <p>Real-time dashboard with 100+ student records, smart search, and beautiful visualizations.</p>
                    <div class="stats-preview" id="homeStats"></div>
                </div>
            </section>

            <!-- Add Student -->
            <section id="add" class="section">
                <h2>➕ Add New Student</h2>
                <form id="addForm">
                    <input type="text" id="name" placeholder="Full Name" required>
                    <select id="dept" required>
                        <option value="">Select Department</option>
                        <option value="CS">Computer Science</option>
                        <option value="IT">Information Technology</option>
                        <option value="EE">Electrical Engineering</option>
                        <option value="ME">Mechanical Engineering</option>
                        <option value="CE">Civil Engineering</option>
                    </select>
                    <input type="number" id="marks" placeholder="Marks (0-100)" min="0" max="100" step="0.01" required>
                    <button type="submit">🚀 Add Student</button>
                </form>
            </section>

            <!-- View Students -->
            <section id="view" class="section">
                <h2>👥 All Students (100+ Records)</h2>
                <div id="studentsGrid" class="student-grid"></div>
                <div class="pagination" id="pagination"></div>
                <button onclick="loadStudents()" style="margin-top: 20px;">🔄 Refresh</button>
            </section>

            <!-- Search -->
            <section id="search" class="section">
                <h2>🔍 Smart Search</h2>
                <div class="search-controls">
                    <label style="display: flex; gap: 8px; align-items: center;">
                        <input type="radio" name="searchType" value="name" checked> Name
                    </label>
                    <label style="display: flex; gap: 8px; align-items: center;">
                        <input type="radio" name="searchType" value="dept"> Department
                    </label>
                    <input type="text" id="searchQuery" placeholder="Enter search term...">
                    <button onclick="performSearch()">🔍 Search</button>
                </div>
                <div id="searchResults" class="student-grid"></div>
            </section>

            <!-- Dashboard -->
            <section id="dashboard" class="section">
                <h2>📊 Analytics Dashboard</h2>
                <div id="chart-container">
                    <canvas id="deptChart"></canvas>
                </div>
                <div id="stats"></div>
                <button onclick="loadStats()">🔄 Refresh Charts</button>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
